name: snapkobi
description: "SnapKOBI - Esnafın AI Asistanı"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  supabase_flutter: 2.9.1
  flutter_dotenv: 5.2.1
  flutter_riverpod: 2.6.1
  equatable: 2.0.8
  json_annotation: 4.11.0
  dio: 5.9.2
  go_router: 13.2.5
  google_fonts: 6.3.3
  image_picker: 1.2.2
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  gal: ^2.3.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: 2.15.0
  json_serializable: 6.13.2
  flutter_lints: 5.0.0
  flutter_launcher_icons: 0.14.4

# Uygulama ikonu üretimi: `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/app_icon_background.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - .env
