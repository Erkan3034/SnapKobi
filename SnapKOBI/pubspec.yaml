publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  supabase_flutter: 2.9.1
  flutter_dotenv: 5.2.1
